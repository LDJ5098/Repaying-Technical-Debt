name: B-Prod (Backend 알림)

on:
  push:
    branches:
      - main
    paths:
      - 'Dev/Dev-server/backend/**'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: sh 문법 체크 (docker-entrypoint.sh)
        run: sh -n Dev/Dev-server/backend/docker-entrypoint.sh

      - name: Dockerfile 문법 체크
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dev/Dev-server/backend/Dockerfile
          ignore: DL3008,DL3015
          ignore: DL3008,DL3015

  build:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 이미지 메타데이터 설정
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,format=short

      - name: Docker 이미지 빌드 및 GHCR push
        uses: docker/build-push-action@v5
        with:
          context: Dev/Dev-server/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  notify:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Discord 승인 요청 전송
        run: |
          curl -X POST https://discord.com/api/channels/${{ secrets.CHANNEL_ID }}/messages \
            -H "Authorization: Bot ${{ secrets.DISCORD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "[Backend] ${{ github.event.head_commit.message }}",
                "url": "${{ github.event.head_commit.url }}",
                "description": "**푸시한 사람:** ${{ github.actor }}\n**Run ID:** ${{ github.run_id }}",
                "color": 39423
              }],
              "components": [{
                "type": 1,
                "components": [
                  {"type": 2, "custom_id": "approve_backend", "label": "✅ 승인", "style": 3},
                  {"type": 2, "custom_id": "reject_backend", "label": "❌ 거부", "style": 4}
                ]
              }]
            }'