name: B-Dev (Dev 배포 알림)

on:
  push:
    branches:
      - main
    paths:
      - 'Dev/Dev-c-client-device/device.c'
      - 'Dev/Dev-c-client-device/Dockerfile'
      - 'Dev/Dev-server/mosquitto/docker-entrypoint.sh'
      - 'Dev/Dev-c-client-device/docker-compose.yml'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: C 컴파일 체크 (device.c)
        run: gcc -fsyntax-only Dev/Dev-c-client-device/device.c

      - name: Dockerfile 문법 체크 (c-client-device)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dev/Dev-c-client-device/Dockerfile
          ignore: DL3018

      - name: sh 문법 체크 (docker-entrypoint.sh)
        run: sh -n Dev/Dev-server/mosquitto/docker-entrypoint.sh

      - name: docker-compose 문법 체크
        run: docker compose -f Dev/Dev-c-client-device/docker-compose.yml config

  notify:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Discord 승인 요청 전송
        run: |
          curl -X POST https://discord.com/api/channels/${{ secrets.CHANNEL_ID }}/messages \
            -H "Authorization: Bot ${{ secrets.DISCORD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "[Dev] ${{ github.event.head_commit.message }}",
                "url": "${{ github.event.head_commit.url }}",
                "description": "**푸시한 사람:** ${{ github.actor }}",
                "color": 16776960
              }],
              "components": [{
                "type": 1,
                "components": [
                  {"type": 2, "custom_id": "approve_dev", "label": "✅ 승인", "style": 3},
                  {"type": 2, "custom_id": "reject_dev", "label": "❌ 거부", "style": 4}
                ]
              }]
            }'