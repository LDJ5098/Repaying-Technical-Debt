name: B-Dev (파일 동기화)

on:
  push:
    branches:
      - main
    paths:
      - 'Dev/Dev-c-client-device/device.c'
      - 'Dev/Dev-c-client-device/Dockerfile'
      - 'Dev/Dev-server/mosquitto/docker-entrypoint.sh'
      - 'Dev/Dev-c-client-device/docker-compose.yml'
      - 'Dev/Dev-server/docker-compose.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파일 동기화
        run: |
          cp Dev/Dev-c-client-device/device.c                     infra/Infra-c-client-device/device.c
          cp Dev/Dev-c-client-device/Dockerfile                    infra/Infra-c-client-device/Dockerfile
          cp Dev/Dev-server/mosquitto/docker-entrypoint.sh         infra/Infra-server/mosquitto/docker-entrypoint.sh
          cp Dev/Dev-c-client-device/docker-compose.yml            infra/Infra-c-client-device/docker-compose.yml
          cp Dev/Dev-server/docker-compose.yml                     infra/Infra-server/docker-compose.yml

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/
          git diff --staged --quiet || git commit -m "[B-Dev] Dev → Infra 파일 동기화"
          git push