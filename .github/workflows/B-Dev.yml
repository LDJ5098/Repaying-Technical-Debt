name: B-Dev (Dev 배포 알림)

on:
  push:
    branches:
      - main
    paths:
      - 'Dev/Dev-c-client-device/device.c'
      - 'Dev/Dev-c-client-device/Dockerfile'
      - 'Dev/Dev-server/mosquitto/docker-entrypoint.sh'
      - 'Dev/Dev-c-client-device/docker-compose.yml'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Discord 승인 요청 전송
        run: |
          curl -X POST https://discord.com/api/channels/${{ secrets.CHANNEL_ID }}/messages \
            -H "Authorization: Bot ${{ secrets.DISCORD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "[Dev] ${{ github.event.head_commit.message }}",
                "url": "${{ github.event.head_commit.url }}",
                "description": "**Push User :** ${{ github.actor }}\n**Run ID:** ${{ github.run_id }}",
                "color": 16776960
              }],
              "components": [{
                "type": 1,
                "components": [
                  {"type": 2, "custom_id": "approve_dev", "label": "✅ 승인", "style": 3},
                  {"type": 2, "custom_id": "reject_dev", "label": "❌ 거부", "style": 4}
                ]
              }]
            }'