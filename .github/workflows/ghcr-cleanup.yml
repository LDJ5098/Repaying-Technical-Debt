name: GHCR 이미지 정리

on:
  workflow_run:
    workflows: ["B-Prod (Backend 배포 알림)"]
    types:
      - completed

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: 오래된 backend 이미지 정리 (최근 5개 유지)
        uses: actions/delete-package-versions@v5
        with:
          package-name: repaying-technical-debt/backend
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: false