services:
  # 1. MQTT 브로커
  mqtt:
    build: ./mosquitto
    container_name: ${TAG}-mqtt-broker
    ports:
      # - "${MQTT_EXT_PORT}:${MQTT_INT_PORT}"        # 평문 포트 (테스트 완료, 외부 접근 차단)
      - "${MQTT_TLS_EXT_PORT}:${MQTT_TLS_INT_PORT}"  # TLS 포트
    volumes:
      - /d/작업/프로그램 개발/IoT-Security-Architecture-Configure/infra/infra-server/mosquitto/log:/mosquitto/log
      - /d/작업/프로그램 개발/IoT-Security-Architecture-Configure/infra/infra-server/mosquitto/certs:/mosquitto/certs:ro
      #- ./mosquitto/log:/mosquitto/log
      #- ./mosquitto/certs:/mosquitto/certs:ro          
    environment:
      MQTT_INT_PORT: ${MQTT_INT_PORT}                # 평문 포트 (테스트 완료)
      MQTT_TLS_INT_PORT: ${MQTT_TLS_INT_PORT}         # TLS 포트
    networks:
      - service-net

  # 2. 데이터베이스 (금고)
  database:
    image: mariadb:latest
    container_name: ${TAG}-database
    command: --port=${DB_PORT}
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      #DB관리용 계정 추가
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_USER_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      # DB 실제 데이터를 server/mariadb 폴더에 영구 보존
      # (Docker Compose를 OS로 취급 - OS 내부 스토리지 영역)
      - ./mariadb:/var/lib/mysql
    healthcheck:
      # DB가 실제로 응답 가능한 상태인지 체크
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 5s   # 5초마다 체크
      timeout: 3s    # 3초 안에 응답 없으면 실패
      retries: 5     # 5번 실패하면 unhealthy 판정
    networks:
      - service-net

  # 3. 백엔드 서버
  backend:
    image: ghcr.io/ldj5098/iot-security-architecture-configure/backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: ${TAG}-backend
#    volumes:
#      - ./backend:/app
#      - /app/node_modules
    environment:
      MQTT_INT_PORT: ${MQTT_INT_PORT}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      mqtt:
        condition: service_started   # mqtt는 시작됐을 때
      database:
        condition: service_healthy   # database는 healthy 상태일 때
    networks:
      - service-net
      
networks:
  service-net:
    driver: bridge