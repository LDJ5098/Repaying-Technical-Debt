services:
  # 1. MQTT 브로커
  mqtt:
    image: eclipse-mosquitto:latest
    container_name: ${TAG}-mqtt-broker
    ports:
      # - "${MQTT_EXT_PORT}:${MQTT_INT_PORT}"        # 평문 포트 (테스트 완료, 외부 접근 차단)
      - "${MQTT_TLS_EXT_PORT}:${MQTT_TLS_INT_PORT}"  # TLS 포트
    volumes:
      - ./mosquitto/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./mosquitto/log:/mosquitto/log
      - ./mosquitto/certs:/mosquitto/certs:ro          # 인증서 마운트 추가
    command: sh /docker-entrypoint.sh
    environment:
      MQTT_INT_PORT: ${MQTT_INT_PORT}                # 평문 포트 (테스트 완료)
      MQTT_TLS_INT_PORT: ${MQTT_TLS_INT_PORT}         # TLS 포트
    networks:
      - compose-net

  # 2. 데이터베이스 (금고)
  database:
    image: mariadb:latest
    container_name: ${TAG}-database
    command: --port=${DB_PORT}
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      #DB관리용 계정 추가
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_USER_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      # DB 실제 데이터를 server/mariadb 폴더에 영구 보존
      # (Docker Compose를 OS로 취급 - OS 내부 스토리지 영역)
      - ./mariadb:/var/lib/mysql
    healthcheck:
      # DB가 실제로 응답 가능한 상태인지 체크
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 5s   # 5초마다 체크
      timeout: 3s    # 3초 안에 응답 없으면 실패
      retries: 5     # 5번 실패하면 unhealthy 판정
    networks:
      - compose-net

  # 3. 백엔드 서버
  backend:
    build: ./backend
    container_name: ${TAG}-backend
    environment:
      MQTT_INT_PORT: ${MQTT_INT_PORT}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      mqtt:
        condition: service_started   # mqtt는 시작됐을 때
      database:
        condition: service_healthy   # database는 healthy 상태일 때
    networks:
      - compose-net

  # 4. SSH
  ssh:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: ${TAG}-ssh
    environment:
      - USER_NAME=${SSH_USER}
      - PUBLIC_KEY_FILE=/pubkey/1-LEVEL-KEY.pub

      - SUDO_ACCESS=false
    ports:
      - "${SSH_EXT_PORT}:2222"
    volumes:
      - ./ssh-key/1-LEVEL-KEY.pub:/pubkey/1-LEVEL-KEY.pub:ro

      #SSH로 관리할 대상 컨테이너(폴더) #certs 제외
      - ./mosquitto/docker-entrypoint.sh:/mosquitto/docker-entrypoint.sh:ro
      - ./mosquitto/log:/mosquitto/log:ro                                   
      - ./backend:/backend:ro
    networks:
      - compose-net
  
  # 5. GitHub Actions Runner (B-Prod)
  runner:
    image: ghcr.io/actions/actions-runner:latest
    container_name: ${TAG}-runner
    entrypoint: /runner/entrypoint.sh          # 커스텀 스크립트 주입
    environment:
      - REPO_URL=https://github.com/LDJ5098/IoT-Security-Architecture-Configure
      - RUNNER_NAME=${TAG}-runner
      - ACCESS_TOKEN=${RUNNER_PAT}             # PAT으로 Runner Token 자동 발급
      - RUNNER_WORKDIR=/tmp/runner
      - LABELS=infra-server
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./runner:/runner                        # runner 폴더 마운트
    networks:
      - compose-net
      
networks:
  compose-net:
    driver: bridge